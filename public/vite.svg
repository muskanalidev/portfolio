<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Chrome Gradient -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="15%" stop-color="#E2E8F0" />
      <stop offset="30%" stop-color="#94A3B8" />
      <stop offset="45%" stop-color="#FFFFFF" />
      <stop offset="55%" stop-color="#475569" />
      <stop offset="70%" stop-color="#CBD5E1" />
      <stop offset="85%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>
    
    <!-- Chrome Light Highlight -->
    <linearGradient id="highlightGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FF9FFC" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Outer Glow Group -->
  <g filter="url(#shadow)">
    <!-- Star Body -->
    <path d="M 50 5 Q 50 50 5 50 Q 50 50 50 95 Q 50 50 95 50 Q 50 50 50 5 Z" 
          fill="url(#chromeGrad)" 
          stroke="#E2E8F0" 
          stroke-width="1" />
          
    <!-- Inner Star Highlight (adds 3D metallic feel) -->
    <path d="M 50 15 Q 50 50 15 50 Q 50 50 50 85 Q 50 50 85 50 Q 50 50 50 15 Z" 
          fill="url(#highlightGrad)" 
          opacity="0.6" />
          
    <!-- Center Flare -->
    <circle cx="50" cy="50" r="4" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>